<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="paperGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" stitchTiles="stitch" />
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.52
        0 0 0 0 0.42
        0 0 0 0 0.47
        0 0 0 0.08 0" />
    </filter>
  </defs>
  <rect width="800" height="800" fill="#6B5560" fill-opacity="0" />
  <rect width="800" height="800" filter="url(#paperGrain)" />
</svg>
